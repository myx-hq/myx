name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: MVP contract checks
        run: ./scripts/check-mvp-contract.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Warm-cache add benchmark (non-gate)
        run: ./scripts/benchmark-warm-cache-add.sh --out ./warm-cache-add.json
      - name: Upload warm-cache benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: warm-cache-add
          path: ./warm-cache-add.json
